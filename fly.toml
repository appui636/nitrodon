# fly.toml app configuration file generated for nitrodon on 2026-04-18T10:00:46Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nitrodon'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "data"
  destination = "/data"
  initial_size = 10
